<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes Social</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
</head>
<body>
    <!-- Login Page: Sabse pehle yahi dikhega -->
    <div id="auth-page" class="page active-page">
        <h2>Login ya Sign Up</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="signUp()">Sign Up</button>
    </div>

    <!-- Home Page: Login hone ke baad ye pura dikhega -->
    <div id="home-page" class="page" style="display: none;">
        
        <!-- Sidebar aur Header ko yahan andar rakhein -->
        <div id="mySidebar" class="sidebar">...</div> 
        <div class="header">...</div>

        <div id="home" class="page-content">
            <div class="post-card">
                <textarea id="postInput" placeholder="Apni yaad likhein..."></textarea>
                <button onclick="addPost()">Post Yaad</button>
            </div>
            <div id="feed"></div>
        </div>
        
        <div id="profile" class="page">...</div>
    </div>

    <script type="module" src="app.js"></script>
</body>
    
</html>

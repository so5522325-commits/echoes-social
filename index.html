<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar" class="sidebar">
        <input type="text" id="searchBar" placeholder="Search..." oninput="filterPosts()">
        <a onclick="showPage('home')">🏠 Home</a>
        <a onclick="showPage('profile')">👤 Profile</a>
        <a onclick="logout()" style="color:red;">🚪 Logout</a>
    </div>

    <header id="main-header">
        <div id="menu-btn" onclick="toggleNav()">≡</div>
        <div class="logo">ECHOES</div>
        <div></div>
    </header>

    <main id="content">
        <div id="login-page" class="page active">
            <div class="glass-card">
                <h2>Welcome to Echoes</h2>
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button onclick="registerUser()">Sign Up</button>
                <button onclick="loginUser()" style="background:#555; margin-top:10px;">Login</button>
            </div>
        </div>
        <div id="home" class="page">
            <div class="glass-card">
                <textarea id="postInput" placeholder="Kya yaad hai?"></textarea>
                <button onclick="addPost()">Post Yaad</button>
            </div>
            <div id="feed"></div>
        </div>
        <div id="profile" class="page">
            <div class="glass-card">
                <h2>User Profile</h2>
                <button onclick="logout()">Logout</button>
            </div>
        </div>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>

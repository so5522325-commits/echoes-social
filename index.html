<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Echoes Social</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.0"></script>
</head>
<body>

    <div id="auth-page" class="page active-page">
        <h2>Login ya Sign Up</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="signUp()">Sign Up</button>
    </div>

    <div id="home-page" class="page" style="display: none;">
        <div id="mySidebar" class="sidebar">
            <span class="close-btn" onclick="closeNav()">&times;</span>
            <a onclick="showPage('home')">🏠 Home</a>
        </div>
        <div class="header">
            <div onclick="openNav()">☰</div>
            <div>Echoes</div>
        </div>
        <div id="home" class="page-content">
            <textarea id="postInput" placeholder="Apni yaad likhein..."></textarea>
            <button onclick="addPost()">Post Yaad</button>
            <div id="feed"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
